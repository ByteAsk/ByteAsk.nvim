name: Release

# Neovim plugins have no package registry — installation is `git clone`-based
# (lazy.nvim/packer point straight at this repo). "Publishing" a release means
# cutting a GitHub Release/tag so plugin managers can pin versions and users
# get changelog notes. Also mirrors to luarocks.org when a token is configured,
# for luarocks.nvim-based installs.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  luarocks:
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/checkout@v4
      - name: Publish to luarocks.org
        if: ${{ secrets.LUAROCKS_API_KEY != '' }}
        uses: nvim-neorocks/luarocks-tag-release@v7
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
